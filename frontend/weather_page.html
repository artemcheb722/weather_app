<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Погода</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #060d1f;
    --bg-mid: #0b1a35;
    --bg-card: rgba(255,255,255,0.055);
    --border: rgba(255,255,255,0.1);
    --accent: #5bc8f5;
    --accent-soft: rgba(91,200,245,0.15);
    --gold: #ffd166;
    --rain: #74b9ff;
    --text: #e8f4fd;
    --muted: rgba(232,244,253,0.5);
    --danger: #ff6b6b;
  }

  html, body {
    min-height: 100vh;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    overflow-x: hidden;
  }

  /* ---- ANIMATED BACKGROUND ---- */
  .bg-wrap {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
    background: radial-gradient(ellipse 80% 60% at 20% 10%, #0e2a55 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, #071428 0%, transparent 60%),
                var(--bg-deep);
  }

  .orb {
    position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.35;
    animation: drift 18s ease-in-out infinite alternate;
  }
  .orb1 { width: 480px; height: 480px; background: #1a4b8c; top: -120px; left: -80px; animation-delay: 0s; }
  .orb2 { width: 320px; height: 320px; background: #0d3d6b; top: 40%; right: -60px; animation-delay: -6s; }
  .orb3 { width: 260px; height: 260px; background: #2a5f8f; bottom: -80px; left: 30%; animation-delay: -12s; }

  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, 30px) scale(1.08); }
  }

  /* STARS */
  .stars { position: absolute; inset: 0; }
  .star {
    position: absolute; width: 2px; height: 2px; background: #fff;
    border-radius: 50%; opacity: 0;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    animation-delay: var(--delay, 0s);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--bright, 0.6); }
  }

  /* RAIN */
  .rain-wrap { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .drop {
    position: absolute; top: -20px; width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(116,185,255,0.5));
    border-radius: 1px; animation: fall linear infinite;
    opacity: 0;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(100vh); opacity: 0; }
  }

  /* ---- LAYOUT ---- */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  /* ---- HEADER ---- */
  .header {
    width: 100%; max-width: 700px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 44px;
    opacity: 0; animation: fadeUp 0.6s ease forwards 0.1s;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
    color: var(--accent);
  }
  .logo span { color: var(--text); font-weight: 400; }
  .date-badge {
    font-size: 13px; color: var(--muted); font-weight: 300;
    background: var(--bg-card); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 40px;
  }

  /* ---- SEARCH ---- */
  .search-wrap {
    width: 100%; max-width: 700px; margin-bottom: 40px;
    opacity: 0; animation: fadeUp 0.6s ease forwards 0.2s;
  }
  .search-box {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px; padding: 6px 6px 6px 24px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .search-box:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91,200,245,0.12);
  }
  .search-icon { font-size: 18px; opacity: 0.5; flex-shrink: 0; }
  .search-box input {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; color: var(--text);
    font-weight: 300;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-btn {
    background: var(--accent); color: #060d1f;
    border: none; cursor: pointer;
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 14px; letter-spacing: 0.3px;
    padding: 12px 24px; border-radius: 12px;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .search-btn:hover { background: #7dd8ff; }
  .search-btn:active { transform: scale(0.97); }

  /* ---- MAIN CARD ---- */
  .main-card {
    width: 100%; max-width: 700px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 28px; overflow: hidden;
    opacity: 0; animation: fadeUp 0.6s ease forwards 0.35s;
  }

  /* TOP SECTION */
  .card-top {
    padding: 36px 40px 32px;
    display: flex; align-items: flex-start; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .city-block .city-name {
    font-family: 'Syne', sans-serif;
    font-size: 34px; font-weight: 700; line-height: 1;
    margin-bottom: 6px;
  }
  .city-block .country {
    font-size: 14px; color: var(--muted); font-weight: 300;
    display: flex; align-items: center; gap: 6px;
  }
  .pin-dot {
    width: 6px; height: 6px; background: var(--accent);
    border-radius: 50%; display: inline-block;
  }
  .temp-block { text-align: right; }
  .temp-main {
    font-family: 'Syne', sans-serif;
    font-size: 80px; font-weight: 800; line-height: 1;
    color: #fff; letter-spacing: -4px;
  }
  .temp-main .deg { font-size: 40px; font-weight: 400; color: var(--accent); vertical-align: top; margin-top: 10px; display: inline-block; }
  .feels-like { font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* WEATHER ICON SVG */
  .weather-icon-wrap {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.15; pointer-events: none;
  }

  /* CONDITION BADGE */
  .condition-row {
    padding: 16px 40px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
    background: rgba(91,200,245,0.04);
  }
  .cond-icon { font-size: 26px; line-height: 1; }
  .cond-text {
    font-family: 'Syne', sans-serif;
    font-size: 16px; font-weight: 600; color: var(--accent);
  }
  .cond-desc { font-size: 13px; color: var(--muted); margin-left: auto; font-style: italic; }

  /* STATS GRID */
  .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 0;
  }
  .stat-item {
    padding: 24px 28px;
    border-right: 1px solid var(--border);
    transition: background 0.2s;
    cursor: default;
  }
  .stat-item:last-child { border-right: none; }
  .stat-item:hover { background: rgba(255,255,255,0.04); }
  .stat-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); margin-bottom: 10px; font-weight: 400;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 700; line-height: 1;
    color: var(--text);
  }
  .stat-value .unit { font-size: 14px; font-weight: 400; color: var(--muted); margin-left: 2px; }
  .stat-bar-wrap { margin-top: 10px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .stat-bar { height: 100%; border-radius: 2px; transition: width 1.2s ease; }
  .bar-rain { background: var(--rain); }
  .bar-humid { background: var(--accent); }
  .bar-wind { background: var(--gold); }

  /* HOURLY ROW */
  .section-label {
    padding: 24px 40px 12px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); border-top: 1px solid var(--border);
  }
  .hourly-scroll {
    display: flex; gap: 8px; padding: 0 40px 28px;
    overflow-x: auto; scrollbar-width: none;
  }
  .hourly-scroll::-webkit-scrollbar { display: none; }
  .hour-item {
    flex-shrink: 0; width: 64px; padding: 14px 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border); border-radius: 16px;
    text-align: center; transition: all 0.2s; cursor: default;
  }
  .hour-item:hover { border-color: var(--accent); background: rgba(91,200,245,0.08); }
  .hour-item.active {
    background: rgba(91,200,245,0.18);
    border-color: var(--accent);
  }
  .hour-time { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .hour-emoji { font-size: 18px; margin-bottom: 8px; }
  .hour-temp { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; }

  /* BOTTOM ROW */
  .bottom-row {
    display: grid; grid-template-columns: 1fr 1fr;
    border-top: 1px solid var(--border);
  }
  .mini-stat {
    padding: 22px 28px;
    border-right: 1px solid var(--border);
  }
  .mini-stat:last-child { border-right: none; }
  .mini-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 8px; }
  .mini-val { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; }
  .mini-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

  /* SUN ARC */
  .sun-arc-wrap { padding: 20px 40px 30px; border-top: 1px solid var(--border); }
  .arc-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; }
  .arc-svg { width: 100%; overflow: visible; }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.6; }
  }

  /* RESPONSIVE */
  @media (max-width: 540px) {
    .card-top { padding: 28px 24px; flex-direction: column; gap: 20px; }
    .temp-block { text-align: left; }
    .temp-main { font-size: 60px; }
    .stats-grid { grid-template-columns: 1fr; }
    .stat-item { border-right: none; border-bottom: 1px solid var(--border); }
    .condition-row, .section-label, .hourly-scroll, .sun-arc-wrap { padding-left: 24px; padding-right: 24px; }
    .bottom-row { grid-template-columns: 1fr; }
    .mini-stat { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-wrap">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="stars" id="stars"></div>
  <div class="rain-wrap" id="rainWrap"></div>
</div>

<!-- PAGE -->
<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">небо<span>сфера</span></div>
    <div class="date-badge" id="dateBadge">—</div>
  </header>

  <!-- SEARCH -->
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="cityInput" placeholder="Введите город... (демо-режим)" />
      <button class="search-btn" onclick="handleSearch()">Найти</button>
    </div>
  </div>

  <!-- MAIN CARD -->
  <div class="main-card" id="mainCard">

    <div class="card-top">
      <div class="city-block">
        <div class="city-name" id="cityName">Москва</div>
        <div class="country"><span class="pin-dot"></span><span id="countryName">Россия</span></div>
      </div>
      <div class="weather-icon-wrap">
        <svg width="160" height="160" viewBox="0 0 160 160" id="bigIcon">
          <!-- SUN -->
          <circle cx="80" cy="80" r="36" fill="#ffd166" opacity="0.9"/>
          <g stroke="#ffd166" stroke-width="3.5" stroke-linecap="round">
            <line x1="80" y1="20" x2="80" y2="34"/>
            <line x1="80" y1="126" x2="80" y2="140"/>
            <line x1="20" y1="80" x2="34" y2="80"/>
            <line x1="126" y1="80" x2="140" y2="80"/>
            <line x1="37" y1="37" x2="47" y2="47"/>
            <line x1="113" y1="113" x2="123" y2="123"/>
            <line x1="37" y1="123" x2="47" y2="113"/>
            <line x1="113" y1="47" x2="123" y2="37"/>
          </g>
        </svg>
      </div>
      <div class="temp-block">
        <div class="temp-main"><span id="tempVal">+18</span><span class="deg">°</span></div>
        <div class="feels-like">Ощущается как <span id="feelsLike">+15</span>°</div>
      </div>
    </div>

    <div class="condition-row">
      <div class="cond-icon" id="condIcon">🌤️</div>
      <div class="cond-text" id="condText">Переменная облачность</div>
      <div class="cond-desc" id="condDesc">Хороший день для прогулки</div>
    </div>

    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-label">Осадки</div>
        <div class="stat-value"><span id="precipVal">12</span><span class="unit">%</span></div>
        <div class="stat-bar-wrap"><div class="stat-bar bar-rain" id="barRain" style="width:12%"></div></div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Влажность</div>
        <div class="stat-value"><span id="humidVal">58</span><span class="unit">%</span></div>
        <div class="stat-bar-wrap"><div class="stat-bar bar-humid" id="barHumid" style="width:58%"></div></div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Ветер</div>
        <div class="stat-value"><span id="windVal">14</span><span class="unit">км/ч</span></div>
        <div class="stat-bar-wrap"><div class="stat-bar bar-wind" id="barWind" style="width:28%"></div></div>
      </div>
    </div>

    <div class="section-label">Прогноз на день</div>
    <div class="hourly-scroll" id="hourlyRow"></div>

    <div class="bottom-row">
      <div class="mini-stat">
        <div class="mini-label">Давление</div>
        <div class="mini-val"><span id="pressureVal">762</span> <span style="font-size:13px;color:var(--muted);font-weight:400">мм рт.ст.</span></div>
        <div class="mini-sub" id="pressureSub">Норма</div>
      </div>
      <div class="mini-stat">
        <div class="mini-label">Видимость</div>
        <div class="mini-val"><span id="visibilityVal">10</span> <span style="font-size:13px;color:var(--muted);font-weight:400">км</span></div>
        <div class="mini-sub" id="visibilitySub">Отличная</div>
      </div>
    </div>

    <div class="sun-arc-wrap">
      <div class="arc-label">Восход и закат</div>
      <svg class="arc-svg" height="80" viewBox="0 0 620 80" id="sunArcSvg">
        <!-- drawn by JS -->
      </svg>
    </div>

  </div>

</div>

<script>
  /* ---- STARS ---- */
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;
      --delay:${-Math.random()*5}s;
      --bright:${0.3+Math.random()*0.7};
      width:${Math.random()>0.85?3:2}px;
      height:${Math.random()>0.85?3:2}px;
    `;
    starsEl.appendChild(s);
  }

  /* ---- RAIN ---- */
  function createRain(intensity) {
    const wrap = document.getElementById('rainWrap');
    wrap.innerHTML = '';
    for (let i = 0; i < intensity; i++) {
      const d = document.createElement('div');
      d.className = 'drop';
      const h = 10 + Math.random() * 25;
      d.style.cssText = `
        left:${Math.random()*100}%;
        height:${h}px;
        animation: fall ${0.6+Math.random()*0.8}s linear infinite;
        animation-delay:${-Math.random()*2}s;
        opacity:${0.3+Math.random()*0.5};
      `;
      wrap.appendChild(d);
    }
  }

  /* ---- DATE ---- */
  const now = new Date();
  const opts = { weekday:'long', day:'numeric', month:'long' };
  document.getElementById('dateBadge').textContent = now.toLocaleDateString('ru-RU', opts);

  /* ---- SUN ARC ---- */
  function drawSunArc(sunriseH, sunsetH, currentH) {
    const svg = document.getElementById('sunArcSvg');
    const W = 620, H = 80;
    const pad = 40;
    const arcW = W - pad*2;

    const total = sunsetH - sunriseH;
    const elapsed = Math.max(0, Math.min(1, (currentH - sunriseH) / total));

    let d = `M ${pad} ${H-10}`;
    for (let i = 0; i <= 100; i++) {
      const t = i/100;
      const x = pad + t * arcW;
      const y = (H-10) - Math.sin(Math.PI * t) * (H-16);
      d += ` L ${x} ${y}`;
    }

    const sunX = pad + elapsed * arcW;
    const sunY = (H-10) - Math.sin(Math.PI * elapsed) * (H-16);

    svg.innerHTML = `
      <defs>
        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ffd166" stop-opacity="0.3"/>
          <stop offset="${elapsed*100}%" stop-color="#ffd166" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0.1)" stop-opacity="0.2"/>
        </linearGradient>
      </defs>
      <path d="${d}" stroke="url(#arcGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="${sunX}" cy="${sunY}" r="7" fill="#ffd166" opacity="0.95"/>
      <circle cx="${sunX}" cy="${sunY}" r="12" fill="none" stroke="#ffd166" stroke-width="1.5" opacity="0.3"/>
      <text x="${pad}" y="${H}" font-family="DM Sans" font-size="12" fill="rgba(232,244,253,0.5)">🌅 ${formatTime(sunriseH)}</text>
      <text x="${W-pad}" y="${H}" font-family="DM Sans" font-size="12" fill="rgba(232,244,253,0.5)" text-anchor="end">🌇 ${formatTime(sunsetH)}</text>
    `;
  }

  function formatTime(h) {
    const hh = Math.floor(h);
    const mm = Math.round((h - hh) * 60);
    return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
  }

  /* ---- HOURLY DATA ---- */
  function buildHourly(baseTemp, type) {
    const row = document.getElementById('hourlyRow');
    row.innerHTML = '';
    const hours = ['06:00','09:00','12:00','15:00','18:00','21:00','00:00'];
    const icons = {
      sunny:   ['☀️','☀️','🌤️','☀️','🌤️','🌙','🌙'],
      cloudy:  ['🌥️','⛅','🌤️','🌥️','🌥️','🌙','🌑'],
      rainy:   ['🌦️','🌧️','🌧️','🌦️','🌧️','🌙','🌑'],
      snowy:   ['❄️','🌨️','🌨️','❄️','🌨️','🌙','⭐'],
      stormy:  ['⛈️','🌩️','⛈️','⛈️','🌩️','🌙','🌑'],
    };
    const ico = icons[type] || icons.sunny;
    const delta = [-4,-2,2,4,2,-1,-3];
    hours.forEach((h, i) => {
      const t = baseTemp + delta[i];
      const el = document.createElement('div');
      el.className = 'hour-item' + (i===2?' active':'');
      el.innerHTML = `<div class="hour-time">${h}</div><div class="hour-emoji">${ico[i]}</div><div class="hour-temp">${t>0?'+':''}${t}°</div>`;
      row.appendChild(el);
    });
  }

  /* ---- WEATHER PRESETS ---- */
  const presets = {
    'москва':      { temp:18, feels:15, precip:12, humid:58, wind:14, press:762, vis:10, cond:'Переменная облачность', condDesc:'Хороший день для прогулки', icon:'🌤️', type:'cloudy', country:'Россия', rain:0 },
    'санкт-петербург': { temp:12, feels:9, precip:68, humid:82, wind:22, press:748, vis:5, cond:'Дождь', condDesc:'Возьмите зонт с собой', icon:'🌧️', type:'rainy', country:'Россия', rain:60 },
    'сочи':        { temp:24, feels:26, precip:5,  humid:70, wind:8,  press:758, vis:15, cond:'Ясно', condDesc:'Отличная пляжная погода!', icon:'☀️', type:'sunny', country:'Россия', rain:0 },
    'новосибирск': { temp:-3, feels:-8, precip:45, humid:72, wind:18, press:745, vis:7, cond:'Снегопад', condDesc:'Оденьтесь теплее', icon:'🌨️', type:'snowy', country:'Россия', rain:0 },
    'лондон':      { temp:10, feels:7, precip:55, humid:78, wind:25, press:752, vis:6, cond:'Пасмурно, дождь', condDesc:'Типичный лондонский день', icon:'🌧️', type:'rainy', country:'Великобритания', rain:50 },
    'токио':       { temp:22, feels:21, precip:20, humid:64, wind:12, press:760, vis:12, cond:'Переменная облачность', condDesc:'Приятный весенний день', icon:'⛅', type:'cloudy', country:'Япония', rain:0 },
    'дубай':       { temp:38, feels:42, precip:1,  humid:35, wind:16, press:755, vis:15, cond:'Знойно, ясно', condDesc:'Очень жаркий день', icon:'☀️', type:'sunny', country:'ОАЭ', rain:0 },
    'нью-йорк':    { temp:15, feels:13, precip:30, humid:60, wind:20, press:758, vis:10, cond:'Облачно', condDesc:'Прохладное утро', icon:'🌥️', type:'cloudy', country:'США', rain:10 },
    'рим':         { temp:21, feels:20, precip:8,  humid:50, wind:10, press:765, vis:14, cond:'Солнечно', condDesc:'Типичный римский день', icon:'☀️', type:'sunny', country:'Италия', rain:0 },
    'мюнхен':      { temp:9,  feels:6, precip:40, humid:75, wind:30, press:749, vis:8, cond:'Гроза', condDesc:'Берегитесь молний!', icon:'⛈️', type:'stormy', country:'Германия', rain:80 },
  };

  function applyWeather(city, data) {
    document.getElementById('cityName').textContent = city.charAt(0).toUpperCase() + city.slice(1);
    document.getElementById('countryName').textContent = data.country;
    document.getElementById('tempVal').textContent = (data.temp>0?'+':'')+data.temp;
    document.getElementById('feelsLike').textContent = (data.feels>0?'+':'')+data.feels;
    document.getElementById('condIcon').textContent = data.icon;
    document.getElementById('condText').textContent = data.cond;
    document.getElementById('condDesc').textContent = data.condDesc;
    document.getElementById('precipVal').textContent = data.precip;
    document.getElementById('humidVal').textContent = data.humid;
    document.getElementById('windVal').textContent = data.wind;
    document.getElementById('pressureVal').textContent = data.press;
    document.getElementById('visibilityVal').textContent = data.vis;

    // Update bars with animation
    setTimeout(() => {
      document.getElementById('barRain').style.width = data.precip + '%';
      document.getElementById('barHumid').style.width = data.humid + '%';
      document.getElementById('barWind').style.width = Math.min(100, data.wind*2) + '%';
    }, 100);

    // Pressure label
    const pl = data.press >= 760 ? 'Высокое' : data.press >= 748 ? 'Норма' : 'Пониженное';
    document.getElementById('pressureSub').textContent = pl;

    // Visibility label
    const vl = data.vis >= 10 ? 'Отличная' : data.vis >= 5 ? 'Хорошая' : 'Плохая';
    document.getElementById('visibilitySub').textContent = vl;

    // Rain
    createRain(data.rain);

    // Hourly
    buildHourly(data.temp, data.type);

    // Sun arc
    const curH = now.getHours() + now.getMinutes()/60;
    drawSunArc(6.5, 20, curH);

    // Animate card
    const card = document.getElementById('mainCard');
    card.style.opacity = '0';
    card.style.transform = 'translateY(16px)';
    card.style.transition = 'opacity 0.45s ease, transform 0.45s ease';
    setTimeout(() => {
      card.style.opacity = '1';
      card.style.transform = 'translateY(0)';
    }, 50);
  }

  function handleSearch() {
    const input = document.getElementById('cityInput');
    const raw = input.value.trim().toLowerCase();
    if (!raw) return;

    const found = Object.keys(presets).find(k => k.includes(raw) || raw.includes(k));
    if (found) {
      applyWeather(found, presets[found]);
    } else {
      // random plausible data for unknown city
      const types = ['sunny','cloudy','rainy'];
      const t = types[Math.floor(Math.random()*3)];
      const icons = { sunny:'☀️', cloudy:'🌤️', rainy:'🌧️' };
      const conds = { sunny:'Ясно', cloudy:'Облачно', rainy:'Дождь' };
      applyWeather(raw, {
        temp: Math.round(5 + Math.random()*25),
        feels: Math.round(3 + Math.random()*22),
        precip: t==='rainy'?60:Math.round(Math.random()*30),
        humid: Math.round(40 + Math.random()*40),
        wind: Math.round(5 + Math.random()*25),
        press: Math.round(748 + Math.random()*20),
        vis: Math.round(5 + Math.random()*10),
        cond: conds[t],
        condDesc: 'Прогноз получен',
        icon: icons[t],
        type: t,
        country: 'Мир',
        rain: t==='rainy'?55:0,
      });
    }
    input.value = '';
  }

  document.getElementById('cityInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSearch();
  });

  /* ---- INIT ---- */
  const curH = now.getHours() + now.getMinutes()/60;
  applyWeather('москва', presets['москва']);
  drawSunArc(6.5, 20, curH);
</script>
</body>
