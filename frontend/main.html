<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome · minimal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            /* Фон на весь экран */
            background-image: url('Mountains-peak-snowy-clouds-fog_3840x2160.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white; /* Белый текст для контраста */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
            /* Затемнение фона для читаемости текста */
            position: relative;
        }

        /* Полупрозрачная темная подложка поверх фона, но под текстом */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* Легкое затемнение */
            z-index: 1;
        }

        /* Контейнер для текста — без фона, только позиционирование */
        .content {
            position: relative;
            z-index: 2; /* Чтобы текст был поверх затемнения */
            max-width: 900px;
            width: 100%;
            padding: 2rem;
            text-align: center;
            /* НИКАКОГО ФОНА - только текст */
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5); /* Тень для читаемости */
        }

        .sub {
            font-size: 1.4rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 3rem;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }

        .btn {
            display: inline-block;
            background: white;
            color: #1a1a1a;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 1rem 3rem;
            border-radius: 50px;
            text-decoration: none;
            letter-spacing: 0.3px;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        hr {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            margin: 3rem auto 0;
            max-width: 100px;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Weather tracking app</h1>
        <div class="sub">simple, clean, ready.</div>

        <a href="#" class="btn" id="getStartedBtn">Get started →</a>

        <hr>
    </div>

    <script>
        document.getElementById('getStartedBtn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'https://yourmainsite.com'; // замените на ваш URL
        });
    </script>
</body>
</html>
