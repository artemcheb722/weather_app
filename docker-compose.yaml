services:
  backend:
    build:
      dockerfile: Dockerfile
      context: ./backend
    container_name: backend
    hostname: backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - main_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    networks:
      - main_network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  frontend:
    build:
      dockerfile: Dockerfile
      context: frontend
    container_name: frontend
    hostname: frontend
    restart: always
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/app:/app
    networks:
      - main_network
    command: |
      sh -c "
      uvicorn main:app --port=3000 --host=0.0.0.0 --reload
      "

networks:
  main_network:
    driver: bridge