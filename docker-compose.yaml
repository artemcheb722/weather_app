services:
  backend:
    build:
      dockerfile: Dockerfile
      context: ./backend
    container_name: backend
    hostname: backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - main_network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    networks:
      - main_network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

networks:
  main_network:
    driver: bridge